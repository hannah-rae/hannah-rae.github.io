# All publications, ordered most recent first.
# Source of truth: /files/bibtex/*.bib
#
# To add a new paper:
#   1. Drop a .bib file in /files/bibtex/ (filename = bibkey, e.g. lastname2026key.bib)
#   2. Add an entry here with the same id, plus the paper URL
#
# Fields:
#   id        : bibkey (matches the .bib filename)
#   title     : paper title
#   authors   : full author list, comma-separated, "et al." for long lists ending in "and others"
#   venue     : compact venue + year (e.g. "ICML 2025")
#   year      : integer (used for sorting)
#   paper     : URL to PDF / arxiv / publisher page (optional)
#   code      : link to code repo (optional)
#   site      : link to project website (optional)
#   data      : link to dataset (optional)
#   award     : short award/spotlight tag (optional)
#   thumb_image : path to a thumbnail under /images/ (optional)

