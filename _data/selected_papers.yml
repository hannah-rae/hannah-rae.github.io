# Selected papers shown on the home page (the "Recent work" section).
# Add a new paper by copying a block, replacing the values, and
# putting it at the top. Keep this list short (~6 papers); the full
# list lives at /publications/.
#
# Fields:
#   id            : anchor id (used by theme project links)
#   title         : paper title
#   authors       : full author list, comma-separated
#   venue         : conference/journal + year (e.g. "ICML 2025")
#   award         : optional award/spotlight tag
#   thumb_class   : CSS class name for placeholder gradient
#                   (ph-galileo, ph-momo, ph-olmo, ph-marsbench,
#                    ph-prue, ph-mission, ph-presto, ph-default)
#   thumb_image   : optional path under /images/ for a real thumbnail;
#                   overrides thumb_class when present
#   paper, code, site, data, bibtex : optional links

