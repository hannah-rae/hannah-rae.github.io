<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title }} &mdash; {{ site.title }}</title>
<meta name="description" content="{{ page.excerpt | default: site.description }}">
{% if page.noindex %}<meta name="robots" content="noindex, nofollow">{% endif %}
<link rel="canonical" href="{{ site.url }}{{ page.url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>

{% include site_nav.html %}

<section class="subpage">
  <div class="inner">
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
    {{ content }}
  </div>
</section>

{% include site_footer.html %}
<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
